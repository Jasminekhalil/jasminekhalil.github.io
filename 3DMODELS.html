<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

body {
  background-color: beige;
  padding: 20px;
  font-family: courier;
}

.main {
  max-width: 1000px;
  margin: auto;
}

h1 {
  font-size: 50px;
  word-break: break-all;
}
.container {
  position: relative;
  width: 50%;
  font-family: courier;
  background-color: beige;
}

.image {
  opacity: 1;
  display: block;
  width: 100%;
  height: auto;
  transition: .5s ease;
  backface-visibility: hidden;
}

.middle {
  transition: .5s ease;
  opacity: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
  text-align: center;
  font-family: courier;
}

.container:hover .image {
  opacity: 0.3;
}

.container:hover .middle {
  opacity: 1;
}


.text {
  background-color: black;
  color: white;
  font-size: 16px;
  padding: 16px 32px;
  font-family: courier;
}
div.scrollmenu {
  background-color: #333;
  overflow: auto;
  white-space: nowrap;
}

div.scrollmenu a {
  display: inline-block;
  color: white;
  text-align: center;
  padding: 14px;
  text-decoration: none;
  font-family: courier;
}

div.scrollmenu a:hover {
  background-color: #777;
}
</style>
</head>
<body>

<div class="scrollmenu">
  <a href="index.html">Homepage</a>
  <a href="#Myartwork">My Artwork:</a>
  <a href="Mypaintings.html">Paintings</a>
  <a href="Myillustrations.html">Illustrations</a>
  <a href="3DMODELS.html">3D computerised models</a>
  <a href="Othersartwork.html">Other artists' artwork:</a>
</div>
</style>
</head>
<body>

<h2 style="font-family: courier;">My 3D computerised models</h2>


<div class="container">
  <img src="CHARGINGDOCK3D.png" alt="Avatar" class="image" style="width:100%">
  <div class="middle">
    <div class="text">3D computerised model of an ergonomic charging dock</div>
  </div>
</div>
<div class="container">
  <img src="TOOLSTAND.png" alt="Avatar" class="image" style="width:100%">
  <div class="middle">
    <div class="text">3D computerised model of an ergonomic toolbox for an elementary classroom</div>
  </div>
</div>
</body>
</html>
